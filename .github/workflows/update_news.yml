name: Daily CyberSec Intelligence Fetcher

on:
  schedule:
    # Ejecutar todos los días a las 20:00 UTC
    - cron: '0 20 * * *'
  workflow_dispatch: # Permite ejecución manual desde la web de GitHub

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para poder hacer push al repositorio

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Acelera la ejecución cacheando dependencias

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar script de Inteligencia
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit y Push de los nuevos datos
        run: |
          git config --global user.name "CyberIntel Bot"
          git config --global user.email "bot@cyberintel.local"
          git add news.json
          # Solo hacer commit si hay cambios en news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: Actualización diaria de inteligencia" && git push)
